services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: source_db
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
    ports:
      - "3306:3306"
    volumes:
      - ./ops/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_DB: processed_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres-conduktor:
    image: postgres:14
    container_name: postgres-conduktor
    environment:
      POSTGRES_DB: conduktor_db
      POSTGRES_USER: conduktor
      POSTGRES_PASSWORD: conduktor
    ports:
      - "5433:5432"
    volumes:
      - postgres_conduktor_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3-compatible endpoint
      - "9001:9001" # MinIO Console
    volumes:
      - minio_data:/data

  airflow-webserver:
    build:
      context: ./pipelines/airflow
      dockerfile: ../../infra/dockerfiles/airflow.Dockerfile
    container_name: airflow-webserver
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - kafka
      - mysql
      - minio
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://user:pass@postgres:5432/processed_db
      AIRFLOW_CONN_MYSQL_DEFAULT: mysql://user:pass@mysql:3306/source_db
      AIRFLOW_CONN_POSTGRES_DEFAULT: postgresql://user:pass@postgres:5432/processed_db
      AIRFLOW_WWW_USER: airflow_user
      AIRFLOW_WWW_PASSWORD: airflow_pass
    command:
      - bash
      - -lc
      - >
        airflow db upgrade &&
        if ! airflow users list | grep -q "${AIRFLOW_WWW_USER:-airflow_user}"; then
          airflow users create --username "${AIRFLOW_WWW_USER:-airflow_user}" --password "${AIRFLOW_WWW_PASSWORD:-airflow_pass}" --firstname Airflow --lastname Admin --role Admin --email airflow@example.com;
        fi &&
        airflow webserver
    volumes:
      - ./pipelines/airflow/dags:/opt/airflow/dags
      - ./pipelines/airflow/logs:/opt/airflow/logs
      - ./pipelines/airflow/plugins:/opt/airflow/plugins
      - ./pipelines/great_expectations:/opt/airflow/great_expectations

  airflow-scheduler:
    build:
      context: ./pipelines/airflow
      dockerfile: ../../infra/dockerfiles/airflow.Dockerfile
    container_name: airflow-scheduler
    depends_on:
      - postgres
      - kafka
      - mysql
      - minio
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://user:pass@postgres:5432/processed_db
      AIRFLOW_CONN_MYSQL_DEFAULT: mysql://user:pass@mysql:3306/source_db
      AIRFLOW_CONN_POSTGRES_DEFAULT: postgresql://user:pass@postgres:5432/processed_db
    command: ["bash", "-lc", "airflow db upgrade && airflow scheduler"]
    volumes:
      - ./pipelines/airflow/dags:/opt/airflow/dags
      - ./pipelines/airflow/logs:/opt/airflow/logs
      - ./pipelines/airflow/plugins:/opt/airflow/plugins
      - ./pipelines/great_expectations:/opt/airflow/great_expectations

  spark:
    build:
      context: ./pipelines/spark
      dockerfile: ../../infra/dockerfiles/spark.Dockerfile
    container_name: spark
    depends_on:
      - kafka
      - mysql
      - minio
      - postgres
    volumes:
      - ./pipelines/spark:/opt/spark_jobs
      - ./pipelines/kafka:/opt/kafka_jobs
      - ./pipelines/great_expectations:/opt/spark_jobs/great_expectations
    command: ["tail", "-f", "/dev/null"]

  workflow-api:
    build:
      context: .
      dockerfile: ./infra/dockerfiles/workflow-api.Dockerfile
    container_name: workflow-api
    depends_on:
      - airflow-webserver
      - kafka
      - mysql
      - postgres
      - minio
    ports:
      - "${WORKFLOW_API_PORT:-8081}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: compose
    restart: unless-stopped

  conduktor:
    image: conduktor/conduktor-console:1.28.0
    container_name: conduktor
    depends_on:
      - kafka
      - zookeeper
      - postgres-conduktor
    ports:
      - "8085:8080"
    environment:
      CDK_ORGANIZATION_NAME: "local"
      CDK_ADMIN_EMAIL: "admin@local.dev"
      CDK_ADMIN_PASSWORD: "admin123"
      CDK_DATABASE_URL: "postgresql://conduktor:conduktor@postgres-conduktor:5432/conduktor_db"
      CDK_CLUSTERS_0_ID: "local-kafka"
      CDK_CLUSTERS_0_NAME: "local-kafka"
      CDK_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      CDK_CLUSTERS_0_ZOOKEEPER: "zookeeper:2181"
    restart: unless-stopped

volumes:
  minio_data:
  postgres_data:
  postgres_conduktor_data:
