kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: modern-data-stack
nodes:
- role: control-plane
  extraPortMappings:
  - containerPort: 30080
    hostPort: 8080
    protocol: TCP
  - containerPort: 30081
    hostPort: 8081
    protocol: TCP
  - containerPort: 30900
    hostPort: 9000
    protocol: TCP
  - containerPort: 30901
    hostPort: 9001
    protocol: TCP
  - containerPort: 30092
    hostPort: 9092
    protocol: TCP
  - containerPort: 30443
    hostPort: 8443
    protocol: TCP