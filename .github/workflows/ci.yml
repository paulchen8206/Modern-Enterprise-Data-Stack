name: CI Pipeline

on:
  push:
    branches: [dev]
  pull_request:
    branches: [qa, stg, prd]

jobs:
  validate-and-test:
    name: Validate, Build, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Install project tooling dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install black pyyaml nbformat
          npm install --global prettier

      - name: Run repository validation targets
        run: |
          make validate-compose
          make validate-shell
          make validate-python
          make validate-json
          make validate-yaml
          make validate-notebook
          make validate-format
          make validate-terraform

      - name: Build Java API
        run: mvn -f java-api/pom.xml -DskipTests package

      - name: Validate Helm chart base
        run: |
          helm lint ./helm/modern-data-stack

      - name: Validate Helm chart for dev
        if: ${{ github.event_name == 'push' && github.ref_name == 'dev' }}
        run: |
          helm template modern-data-stack-dev ./helm/modern-data-stack \
            --namespace data-stack-dev \
            -f ./helm/modern-data-stack/values.yaml \
            -f ./helm/modern-data-stack/values-dev.yaml >/dev/null

      - name: Validate Helm chart for qa
        if: ${{ github.event_name == 'pull_request' && github.base_ref == 'qa' }}
        run: |
          helm template modern-data-stack-qa ./helm/modern-data-stack \
            --namespace data-stack-qa \
            -f ./helm/modern-data-stack/values.yaml \
            -f ./helm/modern-data-stack/values-qa.yaml >/dev/null

      - name: Validate Helm chart for stg
        if: ${{ github.event_name == 'pull_request' && github.base_ref == 'stg' }}
        run: |
          helm template modern-data-stack-stg ./helm/modern-data-stack \
            --namespace data-stack-stg \
            -f ./helm/modern-data-stack/values.yaml \
            -f ./helm/modern-data-stack/values-stg.yaml >/dev/null

      - name: Validate Helm chart for prd
        if: ${{ github.event_name == 'pull_request' && github.base_ref == 'prd' }}
        run: |
          helm template modern-data-stack-prd ./helm/modern-data-stack \
            --namespace data-stack-prd \
            -f ./helm/modern-data-stack/values.yaml \
            -f ./helm/modern-data-stack/values-prd.yaml >/dev/null
