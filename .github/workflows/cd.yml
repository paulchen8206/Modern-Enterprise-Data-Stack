name: CD Pipeline

on:
  pull_request:
    branches: [qa, stg, prd]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  deploy-helm:
    name: Deploy to Kubernetes via Helm (${{ matrix.environment }})
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.base_ref == matrix.environment) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: qa
            namespace: data-stack-qa
            values_file: ./helm/modern-data-stack/values-qa.yaml
            kubeconfig_secret: KUBE_CONFIG_DATA_QA
          - environment: stg
            namespace: data-stack-stg
            values_file: ./helm/modern-data-stack/values-stg.yaml
            kubeconfig_secret: KUBE_CONFIG_DATA_STG
          - environment: prd
            namespace: data-stack-prd
            values_file: ./helm/modern-data-stack/values-prd.yaml
            kubeconfig_secret: KUBE_CONFIG_DATA_PRD
    env:
      RELEASE_NAME: modern-data-stack-${{ matrix.environment }}
      K8S_NAMESPACE: ${{ matrix.namespace }}
      HELM_CHART_PATH: ./helm/modern-data-stack

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets[matrix.kubeconfig_secret] }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Validate Helm chart
        run: |
          helm lint "$HELM_CHART_PATH"
          helm template "$RELEASE_NAME" "$HELM_CHART_PATH" \
            --namespace "$K8S_NAMESPACE" \
            -f "$HELM_CHART_PATH/values.yaml" \
            -f "${{ matrix.values_file }}" >/dev/null

      - name: Deploy with Helm
        run: |
          helm upgrade --install "$RELEASE_NAME" "$HELM_CHART_PATH" \
            --namespace "$K8S_NAMESPACE" \
            --create-namespace \
            -f "$HELM_CHART_PATH/values.yaml" \
            -f "${{ matrix.values_file }}" \
            --wait \
            --timeout 10m

      - name: Verify rollout
        run: kubectl rollout status deployment/data-pipeline -n "$K8S_NAMESPACE" --timeout=5m
