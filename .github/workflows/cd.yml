name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    branches: [PRIMARY_BRANCH]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy-prep:
    name: Build Deployment Artifacts
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build workflow-api image
        run: docker build -t modern-enterprise-data-stack-workflow-api:ci -f infra/dockerfiles/workflow-api.Dockerfile .

      - name: Build airflow image
        run: docker build -t modern-enterprise-data-stack-airflow:ci -f infra/dockerfiles/airflow.Dockerfile pipelines/airflow

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifests (client-side)
        run: |
          kubectl apply --dry-run=client -f k8s/deployment.yaml
          kubectl apply --dry-run=client -f k8s/services.yaml
          kubectl apply --dry-run=client -f k8s/ingress.yaml
          kubectl apply --dry-run=client -f k8s/rollout-blue-green.yaml
          kubectl apply --dry-run=client -f k8s/rollout-canary.yaml

      - name: Package deployment manifests
        run: tar -czf deployment-manifests.tar.gz k8s

      - name: Upload deployment manifests artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-manifests
          path: deployment-manifests.tar.gz
